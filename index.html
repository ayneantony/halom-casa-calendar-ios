<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halom Casa Calendar</title>
    <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.18/index.global.min.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f5f5f5;
        }
        header {
            background: #222;
            color: #fff;
            padding: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .header-actions {
            display: flex;
            gap: 10px;
        }
        #loginBox, #calendarContainer {
            max-width: 1100px;
            margin: 20px auto;
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        input, select, button {
            padding: 10px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,.6);
            justify-content: center;
            align-items: center;
            z-index: 99999;
        }
        .modal-content {
            background: #fff;
            padding: 20px;
            border-radius: 10px;
            width: 90%;
            max-width: 500px;
        }
    </style>
</head>
<body>

    <header>
        <h3>Halom Casa Calendar</h3>
        <div class="header-actions">
            <button id="copyReportBtn" style="width:auto;display:none;background:#3498db;color:#fff;border:none;border-radius:4px;cursor:pointer;">Copy Month Report</button>
            <button id="logoutBtn" style="width:auto;display:none">Logout</button>
        </div>
    </header>

    <div id="loginBox">
        <h2>Login</h2>
        <input id="email" type="email" placeholder="Email">
        <input id="password" type="password" placeholder="Password">
        <button id="loginBtn">Login</button>
        <div id="loginMsg" style="color: red; margin-top: 10px;"></div>
    </div>

    <div id="calendarContainer" style="display:none">
        <div id="calendar"></div>
    </div>

    <div id="bookingModal" class="modal">
        <div class="modal-content">
            <h3>Create Booking</h3>
            <input id="guestName" placeholder="Guest Name">
            <select id="bookingType">
                <option value="Full Property">Full Property</option>
                <option value="1 Room">1 Room</option>
                <option value="2 Rooms">2 Rooms</option>
            </select>
            <button id="saveBooking">Save Booking</button>
            <button onclick="closeBooking()">Cancel</button>
        </div>
    </div>

    <div id="viewModal" class="modal">
        <div class="modal-content">
            <h3>Booking Details</h3>
            <p><b>Date:</b> <span id="vDate"></span></p>
            <p><b>Guest:</b> <span id="vGuest"></span></p>
            <p><b>Type:</b> <span id="vType"></span></p>
            <p><b>Booked By:</b> <span id="vBookedBy"></span></p>
            <p><b>Booked On:</b> <span id="vBookedOn"></span></p>
            <p><b>Availability:</b> <span id="vAvailability"></span></p>
            <button id="unblockBtn" style="background: #e74c3c; color: white;">Delete Booking</button>
            <button onclick="closeView()">Close</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, deleteDoc, doc, onSnapshot, query, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.14.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCLeIhKV7wHeeTtJhKuCSJuoJwfr8Lqn54",
            authDomain: "halom-casa-booking-calendar.firebaseapp.com",
            projectId: "halom-casa-booking-calendar",
            storageBucket: "halom-casa-booking-calendar.firebasestorage.app",
            messagingSenderId: "171254486073",
            appId: "1:171254486073:web:d1ea9a603c5b33d602a9e8"
        };

        const ADMIN_EMAIL = "ayneantony4159@gmail.com";

        function getUserColor(email) {
            if (email === ADMIN_EMAIL) {
                return "#e74c3c"; // Red for admin
            }
            const colors = [
                "#3498db", "#2ecc71", "#9b59b6", "#f39c12", 
                "#1abc9c", "#e84393", "#34495e", "#16a085"
            ];
            let hash = 0;
            for (let i = 0; i < email.length; i++) {
                hash += email.charCodeAt(i);
            }
            return colors[Math.abs(hash) % colors.length];
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let calendar;
        let selectedDate = null;
        let selectedDoc = null;

        // Elements
        const loginBtn = document.getElementById("loginBtn");
        const logoutBtn = document.getElementById("logoutBtn");
        const copyReportBtn = document.getElementById("copyReportBtn");
        const loginBox = document.getElementById("loginBox");
        const calendarContainer = document.getElementById("calendarContainer");
        const emailInput = document.getElementById("email");
        const passwordInput = document.getElementById("password");
        const loginMsg = document.getElementById("loginMsg");
        const guestName = document.getElementById("guestName");
        const bookingType = document.getElementById("bookingType");
        const saveBooking = document.getElementById("saveBooking");
        const unblockBtn = document.getElementById("unblockBtn");

        const vDate = document.getElementById("vDate");
        const vGuest = document.getElementById("vGuest");
        const vType = document.getElementById("vType");
        const vBookedBy = document.getElementById("vBookedBy");
        const vBookedOn = document.getElementById("vBookedOn");
        const vAvailability = document.getElementById("vAvailability");

        function openModal(id) { document.getElementById(id).style.display = "flex"; }
        function closeModal(id) { document.getElementById(id).style.display = "none"; }
        
        window.closeBooking = () => closeModal("bookingModal");
        window.closeView = () => closeModal("viewModal");

        loginBtn.onclick = async () => {
            try {
                loginMsg.innerText = "";
                await signInWithEmailAndPassword(auth, emailInput.value, passwordInput.value);
            } catch (e) {
                loginMsg.innerText = e.message;
            }
        };

        logoutBtn.onclick = () => signOut(auth);

        onAuthStateChanged(auth, user => {
            if (user) {
                loginBox.style.display = "none";
                calendarContainer.style.display = "block";
                logoutBtn.style.display = "block";
                copyReportBtn.style.display = "block";
                if (!calendar) initCalendar();
            } else {
                loginBox.style.display = "block";
                calendarContainer.style.display = "none";
                logoutBtn.style.display = "none";
                copyReportBtn.style.display = "none";
            }
        });

        function roomsUsed(type) {
            if (type === "Full Property") return 3;
            if (type === "2 Rooms") return 2;
            return 1;
        }

        function initCalendar() {
            calendar = new FullCalendar.Calendar(document.getElementById('calendar'), {
                initialView: 'dayGridMonth',
                dateClick(info) {
                    selectedDate = info.dateStr;
                    openModal("bookingModal");
                },
                eventClick(info) {
                    const e = info.event.extendedProps;
                    selectedDoc = e.docId;
                    vDate.innerText = info.event.startStr;
                    vGuest.innerText = e.guestName;
                    vType.innerText = e.bookingType;
                    vBookedBy.innerText = e.bookedBy || "-";
                    vBookedOn.innerText = e.createdAt && e.createdAt.toDate ? e.createdAt.toDate().toLocaleString() : "-";
                    vAvailability.innerText = e.availability || "";
                    
                    const user = auth.currentUser;
                    unblockBtn.style.display = (user.email === ADMIN_EMAIL || user.uid === e.userId) ? "block" : "none";
                    openModal("viewModal");
                }
            });
            calendar.render();
            loadBookings();
        }

        function loadBookings() {
            onSnapshot(query(collection(db, "blockedDates")), snap => {
                calendar.removeAllEvents();
                const dayTotals = {};
                
                snap.forEach(d => {
                    const data = d.data();
                    const used = roomsUsed(data.bookingType || "1 Room");
                    dayTotals[data.date] = (dayTotals[data.date] || 0) + used;
                });

                snap.forEach(d => {
                    const data = d.data();
                    const remaining = Math.max(0, 3 - (dayTotals[data.date] || 0));
                    calendar.addEvent({
                        title: `${data.bookingType} - ${data.guestName}`,
                        start: data.date,
                        allDay: true,
                        color: getUserColor(data.bookedBy || ""),
                        extendedProps: {
                            docId: d.id,
                            guestName: data.guestName,
                            bookingType: data.bookingType,
                            bookedBy: data.bookedBy,
                            userId: data.userId,
                            createdAt: data.createdAt,
                            availability: remaining === 0 ? "Fully Booked" : remaining + " room(s) available"
                        }
                    });
                });
            });
        }

        copyReportBtn.onclick = async () => {
            if (!calendar) return;

            // Get the current viewed date from FullCalendar
            const currentPeriod = calendar.getDate(); 
            const currentYear = currentPeriod.getFullYear();
            const currentMonth = currentPeriod.getMonth(); // 0-11

            const monthNames = ["January", "February", "March", "April", "May", "June", "July", "August", "September", "October", "November", "December"];
            const currentMonthName = monthNames[currentMonth];

            // Get all visible events and sort them chronologically
            let events = calendar.getEvents().filter(e => {
                const eventDate = new Date(e.startStr);
                return eventDate.getFullYear() === currentYear && eventDate.getMonth() === currentMonth;
            });

            events.sort((a, b) => a.startStr.localeCompare(b.startStr));

            let lines = [`Halom Casa Bookings - ${currentMonthName} ${currentYear}\n`];

            events.forEach(e => {
                const props = e.extendedProps;
                // Parse date string (YYYY-MM-DD) to custom presentation (DD/MM/YYYY)
                const parts = e.startStr.split('-');
                if(parts.length === 3) {
                    const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                    lines.push(`${formattedDate} - ${props.bookingType} - ${props.guestName}`);
                }
            });

            const now = new Date();
            const pad = (n) => String(n).padStart(2, '0');
            const day = pad(now.getDate());
            const monthStr = pad(now.getMonth() + 1);
            const year = now.getFullYear();
            
            let hours = now.getHours();
            const ampm = hours >= 12 ? 'pm' : 'am';
            hours = hours % 12;
            hours = hours ? hours : 12; // conversion of 0 to 12
            const minutes = pad(now.getMinutes());

            const formattedGenDate = `${day}/${monthStr}/${year} ${pad(hours)}:${minutes} ${ampm}`;

            lines.push(`\nTotal Bookings: ${events.length}`);
            lines.push(`Generated on: ${formattedGenDate}`);

            const reportText = lines.join('\n');

            try {
                await navigator.clipboard.writeText(reportText);
                alert("Report successfully copied to clipboard!");
            } catch (err) {
                alert("Failed to copy report: " + err);
            }
        };

        saveBooking.onclick = async () => {
            const user = auth.currentUser;
            const guest = guestName.value.trim();
            const type = bookingType.value;
            if (!guest) {
                alert("Enter guest name");
                return;
            }
            
            const events = calendar.getEvents().filter(e => e.startStr === selectedDate);
            let used = 0;
            let full = false;
            
            events.forEach(e => {
                const t = e.extendedProps.bookingType;
                if (t === "Full Property") full = true;
                used += roomsUsed(t);
            });

            if (full) {
                alert("Full Property already booked.");
                return;
            }
            
            const requested = roomsUsed(type);
            if (used + requested > 3) {
                alert("Not enough rooms available.");
                return;
            }

            try {
                await addDoc(collection(db, "blockedDates"), {
                    date: selectedDate,
                    guestName: guest,
                    bookingType: type,
                    bookedBy: user.email,
                    userId: user.uid,
                    createdAt: serverTimestamp()
                });
                guestName.value = "";
                closeModal("bookingModal");
            } catch (err) {
                alert("Error saving booking: " + err.message);
            }
        };

        unblockBtn.onclick = async () => {
            try {
                await deleteDoc(doc(db, "blockedDates", selectedDoc));
                closeModal("viewModal");
            } catch (err) {
                alert("Error deleting booking: " + err.message);
            }
        };
    </script>
</body>
</html>
